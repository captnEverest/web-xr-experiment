<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AVP WebXR Launch Tester</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0d12;
      color: #e8eefc;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .wrap {
      width: min(900px, 92vw);
      padding: 24px;
      border: 1px solid #283247;
      border-radius: 16px;
      background: #121722;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 24px;
    }
    p {
      margin: 0 0 16px 0;
      color: #b8c3d9;
      line-height: 1.5;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 16px 0;
    }
    button {
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid #425273;
      background: #1b2434;
      color: #eef4ff;
      cursor: pointer;
      font-size: 15px;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .panel {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: #0d121b;
      border: 1px solid #243047;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
      font-size: 13px;
    }
    .ok { color: #8de6a1; }
    .bad { color: #ff9e9e; }
    .warn { color: #ffd98d; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Apple Vision Pro WebXR Launch Tester</h1>
    <p>
      Use this first to verify WebXR, immersive-vr, reference spaces, and hand-tracking.
      Once this launches cleanly, move back to your bigger renderer.
    </p>

    <div class="row">
      <button id="checkBtn">Check Support</button>
      <button id="launchBtn" disabled>Launch immersive-vr</button>
      <button id="endBtn" disabled>End Session</button>
    </div>

    <div class="panel mono" id="supportBox">Support check has not run yet.</div>
    <div class="panel mono" id="logBox">Logs will appear here.</div>
  </div>

  <script>
    const checkBtn = document.getElementById("checkBtn");
    const launchBtn = document.getElementById("launchBtn");
    const endBtn = document.getElementById("endBtn");
    const supportBox = document.getElementById("supportBox");
    const logBox = document.getElementById("logBox");

    let xrSession = null;
    let xrRefSpace = null;
    let gl = null;
    let glLayer = null;
    let canvas = null;
    let rafHandle = null;
    let skeletonProgram = null;
    let pointBuffer = null;
    let lineBuffer = null;
    let pointCount = 0;
    let lineVertexCount = 0;

    const HAND_JOINTS = [
      "wrist",
      "thumb-metacarpal", "thumb-phalanx-proximal", "thumb-phalanx-distal", "thumb-tip",
      "index-finger-metacarpal", "index-finger-phalanx-proximal", "index-finger-phalanx-intermediate", "index-finger-phalanx-distal", "index-finger-tip",
      "middle-finger-metacarpal", "middle-finger-phalanx-proximal", "middle-finger-phalanx-intermediate", "middle-finger-phalanx-distal", "middle-finger-tip",
      "ring-finger-metacarpal", "ring-finger-phalanx-proximal", "ring-finger-phalanx-intermediate", "ring-finger-phalanx-distal", "ring-finger-tip",
      "pinky-finger-metacarpal", "pinky-finger-phalanx-proximal", "pinky-finger-phalanx-intermediate", "pinky-finger-phalanx-distal", "pinky-finger-tip"
    ];

    const HAND_BONES = [
      ["wrist", "thumb-metacarpal"],
      ["thumb-metacarpal", "thumb-phalanx-proximal"],
      ["thumb-phalanx-proximal", "thumb-phalanx-distal"],
      ["thumb-phalanx-distal", "thumb-tip"],

      ["wrist", "index-finger-metacarpal"],
      ["index-finger-metacarpal", "index-finger-phalanx-proximal"],
      ["index-finger-phalanx-proximal", "index-finger-phalanx-intermediate"],
      ["index-finger-phalanx-intermediate", "index-finger-phalanx-distal"],
      ["index-finger-phalanx-distal", "index-finger-tip"],

      ["wrist", "middle-finger-metacarpal"],
      ["middle-finger-metacarpal", "middle-finger-phalanx-proximal"],
      ["middle-finger-phalanx-proximal", "middle-finger-phalanx-intermediate"],
      ["middle-finger-phalanx-intermediate", "middle-finger-phalanx-distal"],
      ["middle-finger-phalanx-distal", "middle-finger-tip"],

      ["wrist", "ring-finger-metacarpal"],
      ["ring-finger-metacarpal", "ring-finger-phalanx-proximal"],
      ["ring-finger-phalanx-proximal", "ring-finger-phalanx-intermediate"],
      ["ring-finger-phalanx-intermediate", "ring-finger-phalanx-distal"],
      ["ring-finger-phalanx-distal", "ring-finger-tip"],

      ["wrist", "pinky-finger-metacarpal"],
      ["pinky-finger-metacarpal", "pinky-finger-phalanx-proximal"],
      ["pinky-finger-phalanx-proximal", "pinky-finger-phalanx-intermediate"],
      ["pinky-finger-phalanx-intermediate", "pinky-finger-phalanx-distal"],
      ["pinky-finger-phalanx-distal", "pinky-finger-tip"]
    ];

    function writeLog(message) {
      console.log("[AVP XR]", message);
      logBox.textContent = `${new Date().toLocaleTimeString()}  ${message}\n` + logBox.textContent;
    }

    function formatError(err) {
      if (!err) return "Unknown error";
      const parts = [];
      if (err.name) parts.push(`name=${err.name}`);
      if (err.message) parts.push(`message=${err.message}`);
      if (err.code !== undefined) parts.push(`code=${err.code}`);
      if (err.stack) parts.push(`stack=${err.stack}`);
      return parts.join("\n");
    }

    async function checkSupport() {
      const lines = [];
      const secure = window.isSecureContext;
      lines.push(`Secure context: ${secure ? "YES" : "NO"}`);

      if (!secure) {
        lines.push("This page must be served from HTTPS or localhost.");
      }

      if (!("xr" in navigator)) {
        lines.push("navigator.xr: MISSING");
        supportBox.textContent = lines.join("\n");
        launchBtn.disabled = true;
        return;
      }

      lines.push("navigator.xr: present");

      try {
        const supported = await navigator.xr.isSessionSupported("immersive-vr");
        lines.push(`immersive-vr supported: ${supported ? "YES" : "NO"}`);
        launchBtn.disabled = !supported || !secure;
      } catch (err) {
        lines.push(`isSessionSupported threw:\n${formatError(err)}`);
        launchBtn.disabled = true;
      }

      supportBox.textContent = lines.join("\n");
    }

    function setupGL() {
      canvas = document.createElement("canvas");
      document.body.appendChild(canvas);

      const attrs = {
        antialias: false,
        alpha: true,
        depth: true,
        stencil: false,
        xrCompatible: true
      };

      gl =
        canvas.getContext("webgl2", attrs) ||
        canvas.getContext("webgl", attrs);

      if (!gl) {
        throw new Error("Unable to create WebGL context.");
      }

      initSkeletonRenderer();
      return gl;
    }

    function compileShader(type, source) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, source);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(shader) || "Shader compilation failed");
      }
      return shader;
    }

    function createProgram(vsSource, fsSource) {
      const vs = compileShader(gl.VERTEX_SHADER, vsSource);
      const fs = compileShader(gl.FRAGMENT_SHADER, fsSource);
      const program = gl.createProgram();
      gl.attachShader(program, vs);
      gl.attachShader(program, fs);
      gl.linkProgram(program);
      if (!gl.getProgramParameter(program, gl.LINK_STATUS)) {
        throw new Error(gl.getProgramInfoLog(program) || "Program link failed");
      }
      return program;
    }

    function initSkeletonRenderer() {
      const vert = `
        attribute vec3 a_pos;
        uniform mat4 u_viewProj;
        uniform float u_pointSize;
        void main() {
          gl_Position = u_viewProj * vec4(a_pos, 1.0);
          gl_PointSize = u_pointSize;
        }
      `;
      const frag = `
        precision mediump float;
        uniform vec4 u_color;
        void main() {
          gl_FragColor = u_color;
        }
      `;

      skeletonProgram = createProgram(vert, frag);
      pointBuffer = gl.createBuffer();
      lineBuffer = gl.createBuffer();
    }

    function mat4Multiply(a, b) {
      const out = new Float32Array(16);
      for (let i = 0; i < 4; i++) {
        for (let j = 0; j < 4; j++) {
          out[j * 4 + i] =
            a[i] * b[j * 4] +
            a[4 + i] * b[j * 4 + 1] +
            a[8 + i] * b[j * 4 + 2] +
            a[12 + i] * b[j * 4 + 3];
        }
      }
      return out;
    }

    function mat4Inverse(m) {
      const out = new Float32Array(16);
      const m00 = m[0],  m01 = m[1],  m02 = m[2],  m03 = m[3];
      const m10 = m[4],  m11 = m[5],  m12 = m[6],  m13 = m[7];
      const m20 = m[8],  m21 = m[9],  m22 = m[10], m23 = m[11];
      const m30 = m[12], m31 = m[13], m32 = m[14], m33 = m[15];

      const b00 = m00 * m11 - m01 * m10;
      const b01 = m00 * m12 - m02 * m10;
      const b02 = m00 * m13 - m03 * m10;
      const b03 = m01 * m12 - m02 * m11;
      const b04 = m01 * m13 - m03 * m11;
      const b05 = m02 * m13 - m03 * m12;
      const b06 = m20 * m31 - m21 * m30;
      const b07 = m20 * m32 - m22 * m30;
      const b08 = m20 * m33 - m23 * m30;
      const b09 = m21 * m32 - m22 * m31;
      const b10 = m21 * m33 - m23 * m31;
      const b11 = m22 * m33 - m23 * m32;

      let det = b00 * b11 - b01 * b10 + b02 * b09 + b03 * b08 - b04 * b07 + b05 * b06;
      if (!det) return out;
      det = 1.0 / det;

      out[0] = (m11 * b11 - m12 * b10 + m13 * b09) * det;
      out[1] = (m02 * b10 - m01 * b11 - m03 * b09) * det;
      out[2] = (m31 * b05 - m32 * b04 + m33 * b03) * det;
      out[3] = (m22 * b04 - m21 * b05 - m23 * b03) * det;
      out[4] = (m12 * b08 - m10 * b11 - m13 * b07) * det;
      out[5] = (m00 * b11 - m02 * b08 + m03 * b07) * det;
      out[6] = (m32 * b02 - m30 * b05 - m33 * b01) * det;
      out[7] = (m20 * b05 - m22 * b02 + m23 * b01) * det;
      out[8] = (m10 * b10 - m11 * b08 + m13 * b06) * det;
      out[9] = (m01 * b08 - m00 * b10 - m03 * b06) * det;
      out[10] = (m30 * b04 - m31 * b02 + m33 * b00) * det;
      out[11] = (m21 * b02 - m20 * b04 - m23 * b00) * det;
      out[12] = (m11 * b07 - m10 * b09 - m12 * b06) * det;
      out[13] = (m00 * b09 - m01 * b07 + m02 * b06) * det;
      out[14] = (m31 * b01 - m30 * b03 - m32 * b00) * det;
      out[15] = (m20 * b03 - m21 * b01 + m22 * b00) * det;
      return out;
    }

    function updateHandGeometry(frame) {
      const points = [];
      const lines = [];
      const inputSummary = [];

      for (const source of xrSession.inputSources) {
        const handedness = source.handedness || "unknown";
        const hasHand = !!source.hand;
        inputSummary.push(`${handedness}: hand=${hasHand}`);
        if (!source.hand) continue;

        const jointPos = {};
        for (const name of HAND_JOINTS) {
          const joint = source.hand.get(name);
          if (!joint) continue;
          const pose = frame.getJointPose(joint, xrRefSpace);
          if (!pose) continue;
          const p = pose.transform.position;
          jointPos[name] = [p.x, p.y, p.z];
          points.push(p.x, p.y, p.z);
        }

        for (const [a, b] of HAND_BONES) {
          if (!jointPos[a] || !jointPos[b]) continue;
          lines.push(jointPos[a][0], jointPos[a][1], jointPos[a][2]);
          lines.push(jointPos[b][0], jointPos[b][1], jointPos[b][2]);
        }

        if (jointPos["wrist"]) {
          const p = jointPos["wrist"];
          inputSummary.push(`${handedness} wrist=(${p[0].toFixed(3)}, ${p[1].toFixed(3)}, ${p[2].toFixed(3)})`);
        }
      }

      pointCount = points.length / 3;
      lineVertexCount = lines.length / 3;

      gl.bindBuffer(gl.ARRAY_BUFFER, pointBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(points), gl.DYNAMIC_DRAW);
      gl.bindBuffer(gl.ARRAY_BUFFER, lineBuffer);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(lines), gl.DYNAMIC_DRAW);

      if (inputSummary.length > 0) {
        logBox.textContent = inputSummary.join("\n");
      }
    }

    function drawSkeleton(view) {
      const viewMat = mat4Inverse(new Float32Array(view.transform.matrix));
      const projMat = new Float32Array(view.projectionMatrix);
      const viewProj = mat4Multiply(projMat, viewMat);

      gl.useProgram(skeletonProgram);
      const aPos = gl.getAttribLocation(skeletonProgram, "a_pos");
      const uViewProj = gl.getUniformLocation(skeletonProgram, "u_viewProj");
      const uPointSize = gl.getUniformLocation(skeletonProgram, "u_pointSize");
      const uColor = gl.getUniformLocation(skeletonProgram, "u_color");

      gl.uniformMatrix4fv(uViewProj, false, viewProj);
      gl.enableVertexAttribArray(aPos);

      if (lineVertexCount > 0) {
        gl.bindBuffer(gl.ARRAY_BUFFER, lineBuffer);
        gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);
        gl.uniform1f(uPointSize, 1.0);
        gl.uniform4f(uColor, 1.0, 0.05, 0.95, 1.0); // very visible magenta links
        gl.drawArrays(gl.LINES, 0, lineVertexCount);
      }

      if (pointCount > 0) {
        gl.bindBuffer(gl.ARRAY_BUFFER, pointBuffer);
        gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);
        gl.uniform1f(uPointSize, 18.0);
        gl.uniform4f(uColor, 0.15, 1.0, 1.0, 1.0); // bright cyan joints
        gl.drawArrays(gl.POINTS, 0, pointCount);
      }
    }

    function onXRFrame(time, frame) {
      rafHandle = xrSession.requestAnimationFrame(onXRFrame);

      const pose = frame.getViewerPose(xrRefSpace);
      if (!pose) return;

      gl.bindFramebuffer(gl.FRAMEBUFFER, glLayer.framebuffer);
      gl.clearColor(0.02, 0.03, 0.06, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
      gl.disable(gl.DEPTH_TEST);
      gl.enable(gl.BLEND);
      gl.blendFunc(gl.SRC_ALPHA, gl.ONE);

      updateHandGeometry(frame);

      for (const view of pose.views) {
        const vp = glLayer.getViewport(view);
        gl.viewport(vp.x, vp.y, vp.width, vp.height);
        drawSkeleton(view);
      }
    }

    async function launchXR() {
      launchBtn.disabled = true;

      try {
        if (!window.isSecureContext) {
          throw new Error("Not a secure context. Serve over HTTPS or localhost.");
        }

        setupGL();

        xrSession = await navigator.xr.requestSession("immersive-vr", {
          requiredFeatures: ["local-floor"],
          optionalFeatures: ["hand-tracking", "bounded-floor"]
        });

        writeLog("requestSession succeeded");

        xrSession.addEventListener("end", () => {
          writeLog("XR session ended");
          xrSession = null;
          xrRefSpace = null;
          glLayer = null;
          endBtn.disabled = true;
          launchBtn.disabled = false;
        });

        xrSession.addEventListener("inputsourceschange", (event) => {
          writeLog(
            `inputsourceschange: added=${event.added.length}, removed=${event.removed.length}`
          );
          for (const src of event.added) {
            writeLog(`added source: handedness=${src.handedness}, hand=${!!src.hand}`);
          }
        });

        await gl.makeXRCompatible();

        glLayer = new XRWebGLLayer(xrSession, gl, {
          antialias: false,
          alpha: true,
          depth: true,
          stencil: false
        });

        await xrSession.updateRenderState({ baseLayer: glLayer });
        writeLog("XRWebGLLayer created and bound");

        try {
          xrRefSpace = await xrSession.requestReferenceSpace("local-floor");
          writeLog("Reference space: local-floor");
        } catch (err) {
          writeLog(`local-floor failed, trying local\n${formatError(err)}`);
          xrRefSpace = await xrSession.requestReferenceSpace("local");
          writeLog("Reference space: local");
        }

        endBtn.disabled = false;
        rafHandle = xrSession.requestAnimationFrame(onXRFrame);
      } catch (err) {
        writeLog("Launch failed:\n" + formatError(err));
        launchBtn.disabled = false;
        endBtn.disabled = true;
      }
    }

    async function endXR() {
      try {
        if (rafHandle && xrSession) {
          xrSession.cancelAnimationFrame(rafHandle);
        }
        if (xrSession) {
          await xrSession.end();
        }
      } catch (err) {
        writeLog("End failed:\n" + formatError(err));
      }
    }

    checkBtn.addEventListener("click", checkSupport);
    launchBtn.addEventListener("click", launchXR);
    endBtn.addEventListener("click", endXR);

    checkSupport();
  </script>
</body>
</html>
