<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AVP WebXR Launch Tester</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0d12;
      color: #e8eefc;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .wrap {
      width: min(900px, 92vw);
      padding: 24px;
      border: 1px solid #283247;
      border-radius: 16px;
      background: #121722;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    h1 {
      margin: 0 0 12px 0;
      font-size: 24px;
    }
    p {
      margin: 0 0 16px 0;
      color: #b8c3d9;
      line-height: 1.5;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 16px 0;
    }
    button {
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid #425273;
      background: #1b2434;
      color: #eef4ff;
      cursor: pointer;
      font-size: 15px;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    .panel {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: #0d121b;
      border: 1px solid #243047;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
      font-size: 13px;
    }
    .ok { color: #8de6a1; }
    .bad { color: #ff9e9e; }
    .warn { color: #ffd98d; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Apple Vision Pro WebXR Launch Tester</h1>
    <p>
      Use this first to verify WebXR, immersive-vr, reference spaces, and hand-tracking.
      Once this launches cleanly, move back to your bigger renderer.
    </p>

    <div class="row">
      <button id="checkBtn">Check Support</button>
      <button id="launchBtn" disabled>Launch immersive-vr</button>
      <button id="endBtn" disabled>End Session</button>
    </div>

    <div class="panel mono" id="supportBox">Support check has not run yet.</div>
    <div class="panel mono" id="logBox">Logs will appear here.</div>
  </div>

  <script>
    const checkBtn = document.getElementById("checkBtn");
    const launchBtn = document.getElementById("launchBtn");
    const endBtn = document.getElementById("endBtn");
    const supportBox = document.getElementById("supportBox");
    const logBox = document.getElementById("logBox");

    let xrSession = null;
    let xrRefSpace = null;
    let gl = null;
    let glLayer = null;
    let canvas = null;
    let rafHandle = null;

    function writeLog(message) {
      console.log("[AVP XR]", message);
      logBox.textContent = `${new Date().toLocaleTimeString()}  ${message}\n` + logBox.textContent;
    }

    function formatError(err) {
      if (!err) return "Unknown error";
      const parts = [];
      if (err.name) parts.push(`name=${err.name}`);
      if (err.message) parts.push(`message=${err.message}`);
      if (err.code !== undefined) parts.push(`code=${err.code}`);
      if (err.stack) parts.push(`stack=${err.stack}`);
      return parts.join("\n");
    }

    async function checkSupport() {
      const lines = [];
      const secure = window.isSecureContext;
      lines.push(`Secure context: ${secure ? "YES" : "NO"}`);

      if (!secure) {
        lines.push("This page must be served from HTTPS or localhost.");
      }

      if (!("xr" in navigator)) {
        lines.push("navigator.xr: MISSING");
        supportBox.textContent = lines.join("\n");
        launchBtn.disabled = true;
        return;
      }

      lines.push("navigator.xr: present");

      try {
        const supported = await navigator.xr.isSessionSupported("immersive-vr");
        lines.push(`immersive-vr supported: ${supported ? "YES" : "NO"}`);
        launchBtn.disabled = !supported || !secure;
      } catch (err) {
        lines.push(`isSessionSupported threw:\n${formatError(err)}`);
        launchBtn.disabled = true;
      }

      supportBox.textContent = lines.join("\n");
    }

    function setupGL() {
      canvas = document.createElement("canvas");
      document.body.appendChild(canvas);

      const attrs = {
        antialias: false,
        alpha: true,
        depth: true,
        stencil: false,
        xrCompatible: true
      };

      gl =
        canvas.getContext("webgl2", attrs) ||
        canvas.getContext("webgl", attrs);

      if (!gl) {
        throw new Error("Unable to create WebGL context.");
      }

      return gl;
    }

    function onXRFrame(time, frame) {
      rafHandle = xrSession.requestAnimationFrame(onXRFrame);

      const pose = frame.getViewerPose(xrRefSpace);
      if (!pose) return;

      gl.bindFramebuffer(gl.FRAMEBUFFER, glLayer.framebuffer);
      gl.clearColor(0.02, 0.03, 0.06, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

      let inputSummary = [];

      for (const source of xrSession.inputSources) {
        const handedness = source.handedness || "unknown";
        const hasHand = !!source.hand;
        inputSummary.push(`${handedness}: hand=${hasHand}`);

        if (source.hand) {
          const wrist = source.hand.get("wrist");
          const indexTip = source.hand.get("index-finger-tip");
          const thumbTip = source.hand.get("thumb-tip");

          if (wrist) {
            const wristPose = frame.getJointPose(wrist, xrRefSpace);
            if (wristPose) {
              const p = wristPose.transform.position;
              inputSummary.push(
                `${handedness} wrist=(${p.x.toFixed(3)}, ${p.y.toFixed(3)}, ${p.z.toFixed(3)})`
              );
            }
          }

          if (indexTip && thumbTip) {
            const indexPose = frame.getJointPose(indexTip, xrRefSpace);
            const thumbPose = frame.getJointPose(thumbTip, xrRefSpace);

            if (indexPose && thumbPose) {
              const a = indexPose.transform.position;
              const b = thumbPose.transform.position;
              const dx = a.x - b.x;
              const dy = a.y - b.y;
              const dz = a.z - b.z;
              const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
              inputSummary.push(`${handedness} pinchDist=${dist.toFixed(4)}m`);
            }
          }
        }
      }

      if (inputSummary.length > 0) {
        logBox.textContent = inputSummary.join("\n");
      }
    }

    async function launchXR() {
      launchBtn.disabled = true;

      try {
        if (!window.isSecureContext) {
          throw new Error("Not a secure context. Serve over HTTPS or localhost.");
        }

        setupGL();

        xrSession = await navigator.xr.requestSession("immersive-vr", {
          requiredFeatures: ["local-floor"],
          optionalFeatures: ["hand-tracking", "bounded-floor"]
        });

        writeLog("requestSession succeeded");

        xrSession.addEventListener("end", () => {
          writeLog("XR session ended");
          xrSession = null;
          xrRefSpace = null;
          glLayer = null;
          endBtn.disabled = true;
          launchBtn.disabled = false;
        });

        xrSession.addEventListener("inputsourceschange", (event) => {
          writeLog(
            `inputsourceschange: added=${event.added.length}, removed=${event.removed.length}`
          );
          for (const src of event.added) {
            writeLog(`added source: handedness=${src.handedness}, hand=${!!src.hand}`);
          }
        });

        await gl.makeXRCompatible();

        glLayer = new XRWebGLLayer(xrSession, gl, {
          antialias: false,
          alpha: true,
          depth: true,
          stencil: false
        });

        await xrSession.updateRenderState({ baseLayer: glLayer });
        writeLog("XRWebGLLayer created and bound");

        try {
          xrRefSpace = await xrSession.requestReferenceSpace("local-floor");
          writeLog("Reference space: local-floor");
        } catch (err) {
          writeLog(`local-floor failed, trying local\n${formatError(err)}`);
          xrRefSpace = await xrSession.requestReferenceSpace("local");
          writeLog("Reference space: local");
        }

        endBtn.disabled = false;
        rafHandle = xrSession.requestAnimationFrame(onXRFrame);
      } catch (err) {
        writeLog("Launch failed:\n" + formatError(err));
        launchBtn.disabled = false;
        endBtn.disabled = true;
      }
    }

    async function endXR() {
      try {
        if (rafHandle && xrSession) {
          xrSession.cancelAnimationFrame(rafHandle);
        }
        if (xrSession) {
          await xrSession.end();
        }
      } catch (err) {
        writeLog("End failed:\n" + formatError(err));
      }
    }

    checkBtn.addEventListener("click", checkSupport);
    launchBtn.addEventListener("click", launchXR);
    endBtn.addEventListener("click", endXR);

    checkSupport();
  </script>
</body>
</html>
